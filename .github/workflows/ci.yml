name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo check -p un7z --no-default-features --locked
      - run: cargo test --workspace --all-targets --all-features --locked
      - run: cargo test -p un7z --examples --all-features --locked
      - run: cargo test --workspace --doc --all-features --locked
      - run: cargo doc --workspace --no-deps --all-features --locked
        env:
          RUSTDOCFLAGS: -D warnings

  platforms:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-targets --all-features --locked

  windows-7zip-capability:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install checksum-pinned stock 7-Zip 26.02 oracle
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $oracleRoot = Join-Path $env:RUNNER_TEMP "un7z-7zip-26.02"
          New-Item -ItemType Directory -Force -Path $oracleRoot | Out-Null
          $installer = Join-Path $oracleRoot "7z2602-x64.exe"
          Invoke-WebRequest -Uri "https://github.com/ip7z/7zip/releases/download/26.02/7z2602-x64.exe" -OutFile $installer
          $expected = "6745fa76dc2ea031596d8678f6f6b99c3c1b435b4164a63485adbbc7b8d82ef0"
          $observed = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($observed -ne $expected) {
            throw "stock 7-Zip 26.02 installer SHA-256 mismatch: $observed"
          }
          $installDirectory = Join-Path $oracleRoot "installed"
          $process = Start-Process -FilePath $installer -ArgumentList "/S", "/D=$installDirectory" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "stock 7-Zip 26.02 installer failed with exit code $($process.ExitCode)"
          }
          $oracle = Join-Path $installDirectory "7z.exe"
          if (-not (Test-Path -LiteralPath $oracle -PathType Leaf)) {
            throw "stock 7-Zip 26.02 console executable was not installed"
          }
          "UN7Z_7ZZ=$oracle" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Run and summarize exact-version Windows metadata capability probes
        shell: pwsh
        run: |
          $output = @(& cargo test -p un7z --test capability_probe --all-features --locked stock_7zz_2602_capability_probe_report -- --ignored --nocapture 2>&1)
          $exitCode = $LASTEXITCODE
          $output | ForEach-Object { Write-Host "$_" }
          $records = @($output | Where-Object { "$_" -like "*UN7Z_7ZZ_PROBE*" })
          "## Exact stock 7-Zip 26.02 capability probe" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "<pre>" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          $records | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "</pre>" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          if ($exitCode -ne 0) {
            exit $exitCode
          }
      - name: Run exact-version generated core and property fixtures
        run: cargo test -p un7z --test generated_oracle --all-features --locked -- --ignored
      - name: Run exact-version generated Phase 5 fixtures
        run: cargo test -p un7z --test phase5_reference --all-features --locked -- --ignored

  linux-7zip-capability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install checksum-pinned stock 7-Zip 26.02 oracle
        shell: bash
        run: |
          set -euo pipefail
          oracle_root="$RUNNER_TEMP/un7z-7zip-26.02-linux"
          mkdir -p "$oracle_root"
          archive="$oracle_root/7z2602-linux-x64.tar.xz"
          curl --fail --location --retry 3 \
            --output "$archive" \
            "https://github.com/ip7z/7zip/releases/download/26.02/7z2602-linux-x64.tar.xz"
          expected="41aaba7b1235304ab5aa0624530c67ae829496cd29e875925271efdccc28c03e"
          observed="$(sha256sum "$archive" | cut -d ' ' -f 1)"
          if [[ "$observed" != "$expected" ]]; then
            echo "stock 7-Zip 26.02 Linux archive SHA-256 mismatch: $observed" >&2
            exit 1
          fi
          install_directory="$oracle_root/installed"
          mkdir -p "$install_directory"
          tar -xJf "$archive" -C "$install_directory" 7zz
          oracle="$install_directory/7zz"
          chmod +x "$oracle"
          echo "UN7Z_7ZZ=$oracle" >> "$GITHUB_ENV"
      - name: Run and summarize exact-version Linux link capability probes
        shell: bash
        run: |
          set +e
          output="$(cargo test -p un7z --test capability_probe --all-features --locked stock_7zz_2602_capability_probe_report -- --ignored --nocapture 2>&1)"
          exit_code=$?
          set -e
          printf '%s\n' "$output"
          {
            echo "## Exact stock 7-Zip 26.02 Linux capability probe"
            echo "<pre>"
            printf '%s\n' "$output" | grep 'UN7Z_7ZZ_PROBE' || true
            echo "</pre>"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$exit_code"

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - run: cargo check --workspace --all-targets --all-features --locked
      - run: cargo test --workspace --all-features --locked

  target-32-bit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu
      - run: sudo apt-get update
      - run: sudo apt-get install --yes gcc-multilib
      - run: cargo check --workspace --all-targets --all-features --locked --target i686-unknown-linux-gnu
      - run: cargo test -p un7z --lib --tests --all-features --locked --target i686-unknown-linux-gnu

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
          manifest-path: fuzz/Cargo.toml
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
          manifest-path: bindings/python/Cargo.toml
          arguments: --all-features --config bindings/python/deny.toml

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo miri setup
      - run: cargo miri test -p un7z --lib --no-default-features

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: cargo test --manifest-path fuzz/Cargo.toml --locked
      - run: cargo fuzz run path_validation -- -runs=10000
      - run: cargo fuzz run header_envelope -- -runs=10000
      - run: cargo fuzz run next_header -- -runs=10000
      - run: cargo fuzz run validated_graph -- -runs=10000
      - run: cargo fuzz run decoding -- -runs=10000
      - run: cargo fuzz run volumes -- -runs=10000
      - run: cargo fuzz run stream_formats -- -runs=10000
