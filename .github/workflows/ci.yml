name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo check -p un7z --no-default-features --locked
      - run: cargo test --workspace --all-targets --all-features --locked
      - run: cargo test -p un7z --examples --all-features --locked
      - run: cargo test --workspace --doc --all-features --locked
      - run: cargo doc --workspace --no-deps --all-features --locked
        env:
          RUSTDOCFLAGS: -D warnings

  platforms:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-targets --all-features --locked

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - run: cargo check --workspace --all-targets --all-features --locked
      - run: cargo test --workspace --all-features --locked

  target-32-bit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu
      - run: sudo apt-get update
      - run: sudo apt-get install --yes gcc-multilib
      - run: cargo check --workspace --all-targets --all-features --locked --target i686-unknown-linux-gnu
      - run: cargo test -p un7z --lib --tests --all-features --locked --target i686-unknown-linux-gnu

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
          manifest-path: fuzz/Cargo.toml
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
          manifest-path: bindings/python/Cargo.toml
          arguments: --all-features --config bindings/python/deny.toml

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo miri setup
      - run: cargo miri test -p un7z --lib --no-default-features

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz run path_validation -- -runs=10000
      - run: cargo fuzz run header_envelope -- -runs=10000
      - run: cargo fuzz run next_header -- -runs=10000
      - run: cargo fuzz run validated_graph -- -runs=10000
      - run: cargo fuzz run decoding -- -runs=10000
      - run: cargo fuzz run volumes -- -runs=10000
