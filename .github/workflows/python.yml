name: python

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  binding-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --manifest-path bindings/python/Cargo.toml -- --check
      - run: cargo clippy --manifest-path bindings/python/Cargo.toml --all-targets --all-features --locked -- -D warnings
      - run: cargo test --manifest-path bindings/python/Cargo.toml --no-default-features --lib --locked
      - run: cargo check --manifest-path bindings/python/Cargo.toml --all-features --locked
      - name: Build source distribution
        run: |
          python -m pip install maturin==1.13.3
          maturin sdist --manifest-path bindings/python/Cargo.toml --out bindings/python/dist
      - name: Rebuild wheel from source distribution
        run: >-
          python -m pip wheel --no-deps
          bindings/python/dist/un7z-0.1.0.tar.gz
          --wheel-dir bindings/python/dist/from-sdist

  binding-msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - run: cargo check --manifest-path bindings/python/Cargo.toml --all-features --locked

  wheels:
    name: wheel-${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            manylinux: "2_17"
            target: x86_64
            smoke: true
            wheel_arch: x86_64
          - name: linux-aarch64
            os: ubuntu-latest
            manylinux: "2_17"
            target: aarch64
            smoke: false
            wheel_arch: aarch64
          - name: macos
            os: macos-latest
            manylinux: "off"
            target: ""
            smoke: true
            wheel_arch: macosx
          - name: windows
            os: windows-latest
            manylinux: "off"
            target: ""
            smoke: true
            wheel_arch: win_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Build wheel
        uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380 # v1.49.4
        with:
          command: build
          maturin-version: v1.13.3
          manylinux: ${{ matrix.manylinux }}
          target: ${{ matrix.target }}
          args: >-
            --manifest-path bindings/python/Cargo.toml
            --release
            --locked
            --compatibility pypi
            --out bindings/python/dist
      - name: Verify CPython 3.9 ABI3 wheel tag
        env:
          EXPECTED_WHEEL_ARCH: ${{ matrix.wheel_arch }}
        run: >-
          python -c "import os; from pathlib import Path;
          wheels=list(Path('bindings/python/dist').glob('*.whl'));
          assert len(wheels) == 1, wheels;
          name=wheels[0].name;
          assert 'cp39-abi3' in name, name;
          assert os.environ['EXPECTED_WHEEL_ARCH'] in name, name"
      - name: Install built wheel
        if: matrix.smoke
        run: python -m pip install --no-index --find-links bindings/python/dist un7z
      - name: Test installed wheel
        if: matrix.smoke
        run: python -m unittest discover -s bindings/python/tests -v
      - uses: actions/upload-artifact@v4
        with:
          name: un7z-${{ matrix.name }}-wheel
          path: bindings/python/dist/*.whl
          if-no-files-found: error

  wheel-linux-aarch64-smoke:
    needs: wheels
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - uses: actions/download-artifact@v4
        with:
          name: un7z-linux-aarch64-wheel
          path: bindings/python/dist
      - name: Install built aarch64 wheel
        run: python -m pip install --no-index --find-links bindings/python/dist un7z
      - name: Test installed aarch64 wheel
        run: python -m unittest discover -s bindings/python/tests -v
